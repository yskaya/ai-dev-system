# Command workflow transitions — consumed by build.py to emit "### Next Step" blocks.
# Every command in recipes/commands/ must have an entry here.

commands:
  create-brief:
    review: MVP scope, non-goals, success criteria
    next: design

  design:
    review: module boundaries, contracts, trust model — run /design-web or /design-macos when platform-specific
    next: plan-work

  design-web:
    review: API contract, auth boundaries, data flow
    next: plan-work

  design-macos:
    review: module map, wire/IPC contracts, entitlements, concurrency boundaries
    next: plan-work

  plan-work:
    review: one build-step per task, clear acceptance criteria
    next: build-step

  build-step:
    next: build-step

  debug:
    review: root cause, fix, verification documented
    next: build-step

  review-code:
    review: decision and P0–P3
    next: doc-pr

  review-security:
    review: security findings and P0–P3
    review_section: Security
    next: doc-pr

  write-unit-tests:
    next: build-step

  doc-pr:
    next: create-brief
