name: write-unit-tests
description: Generate unit tests for implemented behaviour against acceptance criteria

triggers:
  - write unit tests
  - add tests
  - generate tests

body: |
  Prioritise:
    - critical paths, 
    - business logic, 
    - regressions, 
    - unstable areas. 
    
  Avoid:
    - snapshot-heavy
    - implementation-coupled 
    - low-signal tests

targets:
  cursor: {}
