name: backend-architecture
description: Apply backend architecture expertise. Use when deciding how responsibilities and contracts are split across the backend

triggers:
  - backend architecture
  - API design
  - service design

source: schemas/DESIGN.md
output: NNN-DESIGN.md
sections:
  - System structure   # server modules, domain ownership
  - API contracts        # versioning policy with contracts
